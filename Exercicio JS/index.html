<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./scripts.js" defer></script>
</head>
<body>
    <header>
        <h1>Formulário</h1>
    </header>

    <main>
        <form>
            <legend>Fala Doido</legend>

            <label for="verbo">Verbo:</label>
            <input type="text" name="verbo" id="verbo" placeholder="Coloque um verbo..."/>
            
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" placeholder="Coloque um nome..."/>

            <label for="adjetivo">Adjetivo:</label>
            <input type="text" name="adjetivo" id="adjetivo" placeholder="Coloque um adjetivo..."/>

        </form>

        <button id="botao">Doido!</button>

        <span id="frase"></span>
    </main>
</body>
</html>
